name: chat-assistant
version: 1.0.0
description: 交互式对话助手，支持代码理解、编写和项目分析
orchestrator: core
agent:
  name: chat_assistant
  model: qwen-max
  temperature: 0.7
llm:
  model: qwen-max
  temperature: 0.7
  max_tokens: 4000
tools:
- apply_patch
- batch_read_files
- batch_write_files
- discover_project_docs
- get_file_symbols
- get_repo_structure
- git_diff
- list_files
- read_file
- regex_search
- repo_map
- run_lint
- search_replace
- semantic_code_search
- text_search
- write_file
workflows:
  source: sisyphus-orchestrator
project_understanding:
  use_intent: true
middleware:
- context_management
- memory_integration
permissions:
  read:
  - pattern: '*'
    permission: allow
  write:
  - pattern: '*.py'
    permission: allow
  - pattern: '*.js'
    permission: allow
  - pattern: '*.ts'
    permission: allow
  - pattern: '*.md'
    permission: allow
  execute:
  - pattern: '*'
    permission: deny
inputs:
- name: user_input
  type: string
  required: true
  description: 用户输入的问题或指令
- name: session_id
  type: string
  required: false
  description: 会话ID
- name: initial_files
  type: array
  required: false
  description: 打开的编辑器文件列表（优先使用）
- name: repo
  type: string
  required: false
  description: 仓库路径
outputs:
- name: response
  type: string
  description: AI的响应内容
- name: tools_used
  type: array
  description: 使用的工具列表
- name: reasoning
  type: string
  description: 推理过程
hooks:
- logging
- metrics
- memory_save
metadata:
  category: assistant
  cost: MEDIUM
  triggers:
  - 对话
  - 提问
  - 代码编写
  - 项目分析
  use_when:
  - 用户交互
  - 代码理解
  - 项目探索
  features:
  - 自动工具调用
  - 推理循环
  - 记忆集成
  - 上下文管理
_migration_notes:
  migrated_from: react
  original_agents: []
  migration_date: '2024-03-08'
  changes:
  - 使用 CoreOrchestrator 替代 multi_agent/simple/react
  - 合并所有 agent_tools 到统一的 tools 列表
  - 添加 workflows 配置（从 intents.yaml 加载）
  - 添加 project_understanding 配置（预取机制）
