name: code-review
version: 1.0.0
description: 自动代码审查助手，检查代码质量、类型注解、测试覆盖等
orchestrator: core
agent:
  name: code_review
  model: qwen-max
  temperature: 0.3
llm:
  model: qwen-max
  temperature: 0.3
  max_tokens: 4000
tools:
- lsp_diagnostics
- lsp_find_references
- lsp_symbols
- read_file
- repo_map
- semantic_code_search
- text_search
workflows:
  source: sisyphus-orchestrator
middleware:
- context_management
permissions:
  read:
  - pattern: '*'
    permission: allow
  write:
  - pattern: '*'
    permission: deny
  execute:
  - pattern: '*'
    permission: deny
inputs:
- name: file_path
  type: string
  required: true
  description: 要审查的文件路径
- name: session_id
  type: string
  required: false
  description: 会话ID
- name: repo
  type: string
  required: false
  description: 仓库路径
outputs:
- name: review_report
  type: string
  description: 审查报告
- name: quality_score
  type: number
  description: 代码质量评分（0-100）
- name: issues
  type: array
  description: 发现的问题列表
- name: suggestions
  type: array
  description: 改进建议列表
hooks:
- logging
- metrics
metadata:
  category: code-quality
  cost: MEDIUM
  triggers:
  - 代码审查
  - 检查代码
  - 代码质量
  use_when:
  - 代码审查
  - 质量检查
  - 重构前评估
  features:
  - LSP深度分析
  - 自动质量评分
  - 结构化报告
_migration_notes:
  migrated_from: react
  original_agents: []
  migration_date: '2024-03-08'
  changes:
  - 使用 CoreOrchestrator 替代 multi_agent/simple/react
  - 合并所有 agent_tools 到统一的 tools 列表
  - 添加 workflows 配置（从 intents.yaml 加载）
  - 添加 project_understanding 配置（预取机制）
