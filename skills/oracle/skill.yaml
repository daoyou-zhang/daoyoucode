name: oracle
version: 1.0.0
description: 高IQ咨询Agent - 架构分析和技术建议（只读，继承 sisyphus-orchestrator 工作流）

# orchestrator: 编排器类型（决定执行逻辑）
#   - simple: 简单编排器（单 agent）
#   - 提供基础功能：重试机制、结果验证、项目信息预取、成本追踪
#   - 适合：单一职责的任务，不需要多 agent 协作
orchestrator: simple

# agent: 智能体名称（决定 AI 角色）
#   - oracle: 高级咨询智能体（backend/daoyoucode/agents/builtin/oracle.py）
#   - 专注：架构分析、技术建议、代码审查（只读）
agent: oracle

# Prompt配置
prompt:
  file: prompts/oracle.md  # 简洁版本

# 🆕 工作流配置（引用共通工作流）
workflows:
  # 引用 sisyphus-orchestrator 的工作流（能力/方法论）
  source: sisyphus-orchestrator
  # 工作流路径：skills/sisyphus-orchestrator/prompts/workflows/
  available_workflows:
    - analyze_code    # 代码分析工作流
    - debug_code      # 调试工作流（分析问题）
    - refactor_code   # 重构建议工作流
    - find_unused_code  # 🆕 查找未使用代码工作流
    - need_code_context  # 🆕 获取代码上下文工作流
  # Oracle agent 优先使用的意图
  preferred_intents:
    - consult
    - analyze_code
    - review_code
    - find_unused_code  # 🆕 添加：查找未使用代码
    - need_code_context  # 🆕 添加：获取代码上下文

# 意图识别
project_understanding_use_intent: true

# LLM配置（🎯 特化：使用最强模型）
llm:
  model: qwen-max  # 使用最强模型
  temperature: 0.1  # 低温度，更准确
  max_tokens: 4000

# 🎯 特化：只读工具（不能修改代码）
tools:
  - read_file
  - batch_read_files
  - text_search
  - regex_search
  - semantic_code_search
  - get_repo_structure
  - repo_map
  - discover_project_docs
  - get_file_symbols
  - lsp_diagnostics
  - lsp_find_references
  - lsp_symbols
  - ast_grep_search

# 🎯 oracle 是单 Agent，不需要 agent_tools 配置
# 所有工具都是只读的，符合咨询角色

# 中间件
middleware:
  - context_management

# 权限配置（只读）
permissions:
  read:
    - pattern: "*"
      permission: allow
  write:
    - pattern: "*"
      permission: deny  # 禁止写入
  execute:
    - pattern: "*"
      permission: deny  # 禁止执行

# 输入
inputs:
  - name: analysis_request
    type: string
    required: true
    description: 分析需求（架构分析、代码审查、性能分析等）
  
  - name: code_context
    type: string
    required: false
    description: 要分析的代码上下文

# 输出
outputs:
  - name: analysis_result
    type: string
    description: 详细的分析报告
  
  - name: recommendations
    type: array
    description: 改进建议列表

# Hook配置
hooks:
  - logging
  - metrics

# 元数据
metadata:
  category: advisor
  cost: HIGH
  triggers:
    - "架构决策"
    - "代码审查"
    - "性能分析"
    - "安全审查"
    - "技术咨询"
  use_when:
    - "复杂架构设计"
    - "完成重要工作后的自我审查"
    - "2次以上修复失败后"
    - "不熟悉的代码模式"
    - "安全/性能问题"
  avoid_when:
    - "简单文件操作"
    - "第一次尝试修复"
    - "从已读代码可以回答的问题"
    - "琐碎决策（变量命名、格式化）"
