name: programming
version: 1.0.0
description: 编程专家服务（继承 sisyphus-orchestrator 工作流）

# 🆕 使用多Agent编排器（与 sisyphus-orchestrator 一致）
orchestrator: multi_agent
collaboration_mode: main_with_helpers

# 🆕 精简的 Agent 列表（专注编程）
agents:
  - sisyphus          # 主编排
  - programmer        # 核心Agent
  - code_analyzer     # 辅助分析

# Prompt配置（使用独立文件）
prompt:
  file: prompts/programmer.md  # 简洁版本

# 🆕 工作流配置（继承 + 特化）
workflows:
  source: sisyphus-orchestrator  # 从 sisyphus-orchestrator 继承工作流
  preferred_intents:              # 只使用编程相关的意图
    - write_code
    - edit_file
    - search_code

# 意图识别
project_understanding_use_intent: true

# LLM配置（🎯 特化：使用编程专用模型）
llm:
  model: qwen-coder-plus
  temperature: 0.1
  max_tokens: 4000

# 中间件
middleware:
  - context_management

# 🎯 特化：精简的工具列表（只包含编程需要的）
tools:
  - read_file
  - batch_read_files
  - write_file
  - batch_write_files
  - list_files
  - get_file_info
  - text_search
  - regex_search
  - get_file_symbols
  - git_status
  - git_diff
  - search_replace

# 🎯 按 Agent 分配工具（最小权限原则）
agent_tools:
  sisyphus:           # 主编排：协调和执行
    - read_file
    - write_file
    - text_search
    - regex_search
    - get_file_symbols
    - git_status
    - git_diff
  
  programmer:         # 编程专家：读写代码
    - read_file
    - batch_read_files
    - write_file
    - batch_write_files
    - list_files
    - get_file_info
    - text_search
    - regex_search
    - get_file_symbols
    - git_status
    - git_diff
    - search_replace
  
  code_analyzer:      # 架构分析：只读
    - read_file
    - batch_read_files
    - text_search
    - regex_search
    - get_file_symbols

# 输入
inputs:
  - name: task
    type: string
    required: true
    description: 编程任务描述
  
  - name: code_context
    type: string
    required: false
    description: 相关代码上下文
  
  - name: language
    type: string
    required: false
    description: 编程语言

# 输出
outputs:
  - name: code
    type: string
    description: 生成的代码
  
  - name: explanation
    type: string
    description: 代码说明

# Hook配置
hooks:
  - logging
  - metrics
