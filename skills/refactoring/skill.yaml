name: refactoring
version: 1.0.0
description: 代码重构专家服务（继承 sisyphus-orchestrator 工作流）
orchestrator: core
agent:
  name: sisyphus
  model: qwen-coder-plus
  temperature: 0.2
llm:
  model: qwen-coder-plus
  temperature: 0.2
  max_tokens: 4000
tools:
- batch_read_files
- batch_write_files
- get_file_info
- get_file_symbols
- git_diff
- git_status
- list_files
- read_file
- regex_search
- run_test
- search_replace
- text_search
- write_file
workflows:
  source: sisyphus-orchestrator
project_understanding:
  use_intent: true
middleware:
- context_management
permissions:
  read:
  - pattern: '*'
    permission: allow
  write:
  - pattern: '*.py'
    permission: ask
  - pattern: '*.js'
    permission: ask
  - pattern: '*.ts'
    permission: ask
inputs:
- name: refactor_request
  type: string
  required: true
  description: 重构需求
- name: code_content
  type: string
  required: false
  description: 要重构的代码
- name: test_content
  type: string
  required: false
  description: 现有测试
outputs:
- name: refactor_plan
  type: string
  description: 重构方案
- name: steps
  type: array
  description: 重构步骤列表
hooks:
- logging
- metrics
- validation
metadata:
  category: development
  cost: MEDIUM
_migration_notes:
  migrated_from: multi_agent
  original_agents:
  - sisyphus
  - refactor_master
  - code_analyzer
  - test_expert
  migration_date: '2024-03-08'
  changes:
  - 使用 CoreOrchestrator 替代 multi_agent/simple/react
  - 合并所有 agent_tools 到统一的 tools 列表
  - 添加 workflows 配置（从 intents.yaml 加载）
  - 添加 project_understanding 配置（预取机制）
