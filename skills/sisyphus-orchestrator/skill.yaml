name: sisyphus-orchestrator
version: 1.0.0
description: 主编排Agent - 智能任务分解和多Agent调度（类似Sisyphus）

# orchestrator: 编排器类型（决定执行逻辑）
#   - multi_agent: 多智能体编排器
#   - 支持主 agent + 多个辅助 agents 协作
#   - 可以并行或顺序调用辅助 agents，聚合结果
#   - 适合：复杂任务、需要多个专家协作的场景
orchestrator: multi_agent

# collaboration_mode: 协作模式（multi_agent 编排器专用）
#   - main_with_helpers: 主 agent + 辅助 agents（默认）
#   - parallel: 所有 agents 并行执行
#   - sequential: 所有 agents 顺序执行
#   - debate: agents 之间辩论讨论
collaboration_mode: main_with_helpers

# agents: 智能体列表（multi_agent 编排器专用）
#   - 第一个是主 agent，其余是辅助 agents
#   - 每个 agent 对应 backend/daoyoucode/agents/builtin/ 下的 Python 类
agents:
  - sisyphus            # 主编排Agent（任务分解和调度）
  - code_analyzer       # 辅助：架构分析和技术咨询
  - programmer          # 辅助：代码编写
  - refactor_master     # 辅助：代码重构
  - test_expert         # 辅助：测试编写

# Prompt配置（总分关系）
# - 总：prompts/sisyphus.md（通用原则、角色定位、可用工具）
# - 分：prompts/workflows/*.md（具体任务的详细步骤，根据意图动态加载）
prompt:
  file: prompts/sisyphus.md  # 总原则：角色定位、工具说明、通用策略

# 了解项目预取：用 LLM 意图判断，避免死关键词漏掉「理解下当前项目」等说法
project_understanding_use_intent: true

# 可选：预取块总字符上限（不设则默认约 16000）
# project_understanding_max_chars: 20000  # sisyphus 处理复杂任务，可以给更多预算

# 可选：预取块的指导语（不设则使用默认）
# project_understanding_header: "理解项目时，重点关注【代码地图】（核心代码和架构），【目录结构】帮助定位，【项目文档】提供背景。用1-2段话概括项目核心，不要逐条罗列。\n\n"

# LLM配置
llm:
  model: qwen-max
  temperature: 0.3
  max_tokens: 8000

# 🆕 工作流配置已迁移到 intents.yaml
# 意图定义和工作流配置现在统一在 intents.yaml 中管理
# 这样实现了逻辑和数据分离，更加干净纯粹

# 默认工具（未在 agent_tools 中列出的 Agent 使用）
tools:
  - repo_map
  - get_repo_structure
  - text_search
  - read_file
  - batch_read_files      # 🆕 批量读取文件
  - delete_file           # 🆕 删除文件
  - batch_delete_files    # 🆕 批量删除文件

# 按 Agent 分配工具（最优调度：各智能体仅获得其职责所需工具）
agent_tools:
  sisyphus:           # 主编排：理解、协调、执行
    - discover_project_docs  # 🆕 了解项目
    - repo_map
    - get_repo_structure
    - text_search
    - regex_search           # 🆕 正则搜索
    - semantic_code_search   # 🆕 语义搜索
    - read_file
    - batch_read_files
    - write_file             # 🆕 写文件
    - batch_write_files      # 🆕 批量写文件
    - list_files             # 🆕 列出文件
    - delete_file            # 🆕 删除文件
    - batch_delete_files     # 🆕 批量删除文件
    - search_replace         # 🆕 搜索替换
    - get_file_symbols       # 🆕 获取符号
    - git_status             # 🆕 Git 状态
    - git_diff               # 🆕 Git diff
  code_analyzer:      # 架构分析：读 + 地图 + LSP/符号
    - read_file
    - batch_read_files
    - repo_map
    - get_repo_structure
    - text_search
    - regex_search
    - get_file_symbols      # 获取文件符号（不需要 LSP）
    - lsp_diagnostics       # LSP 诊断（检查错误）
    - lsp_find_references   # LSP 查找引用
    - lsp_symbols           # LSP 符号查询（需要具体文件路径）
  programmer:         # 编程：读写 + 搜索 + Git + 编辑
    - read_file
    - batch_read_files
    - write_file
    - batch_write_files
    - list_files
    - get_file_info
    - delete_file
    - batch_delete_files
    - text_search
    - regex_search
    - get_file_symbols
    - git_status
    - git_diff
    - search_replace
  refactor_master:    # 重构：读写 + 搜索 + 编辑 + Git
    - read_file
    - batch_read_files
    - write_file
    - batch_write_files
    - list_files
    - text_search
    - regex_search
    - search_replace
    - get_file_symbols
    - git_status
    - git_diff
  test_expert:        # 测试：读写 + 搜索 + 运行测试/ lint
    - read_file
    - batch_read_files
    - write_file
    - batch_write_files
    - list_files
    - text_search
    - run_test
    - run_lint

# 中间件
middleware:
  - context_management
  - memory_integration

# 权限
permissions:
  read:
    - pattern: "*"
      permission: allow
  write:
    - pattern: "*"
      permission: ask
  execute:
    - pattern: "*"
      permission: ask

# 输入
inputs:
  - name: user_request
    type: string
    required: true
    description: 用户的复杂任务请求
  
  - name: session_id
    type: string
    required: false
    description: 会话ID
  
  - name: repo
    type: string
    required: false
    description: 仓库路径

# 输出
outputs:
  - name: task_plan
    type: string
    description: 任务分解计划
  
  - name: execution_result
    type: string
    description: 执行结果
  
  - name: agents_used
    type: array
    description: 使用的Agent列表
  
  - name: helper_results
    type: array
    description: 辅助Agent的结果

# Hook配置
hooks:
  - logging
  - metrics
  - memory_save

# 元数据
metadata:
  category: orchestrator
  cost: HIGH
  triggers:
    - "复杂任务"
    - "多步骤任务"
    - "需要多个专业领域"
  use_when:
    - "重构 + 测试"
    - "分析 + 优化"
    - "探索 + 编写"
    - "多文件修改"
  features:
    - "智能任务分解"
    - "多Agent协作"
    - "并行执行"
    - "结果聚合"
  
  # 工作流说明
  workflow: |
    1. 主Agent分析用户请求
    2. 分解为子任务
    3. 并行调用辅助Agent（如果可以）
    4. 主Agent看到辅助Agent的结果
    5. 聚合结果返回用户
    
    示例：
    用户："重构登录模块，添加测试"
    
    主Agent分析：
    - 需要code_analyzer分析架构
    - 需要refactor_master执行重构
    - 需要test_expert编写测试
    
    执行流程：
    1. code_analyzer并行执行 → 分析登录模块架构
    2. 主Agent看到分析结果
    3. 调用refactor_master → 执行重构
    4. 调用test_expert → 编写测试
    5. 主Agent聚合结果 → 返回用户
