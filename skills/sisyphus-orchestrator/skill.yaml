name: sisyphus-orchestrator
version: 2.0.0
description: 全能编排器 - 智能任务分解和执行（使用 CoreOrchestrator）

# 🆕 使用 CoreOrchestrator（统一执行引擎）
orchestrator: core

# LLM 配置
llm:
  model: qwen-max
  temperature: 0.3
  max_tokens: 8000
  # 🔥 意图识别使用小模型（快速、便宜、准确）
  intent_model: qwen-turbo  # 专门用于意图识别的小模型

# 🆕 Prompt 模板配置
prompt_template:
  base: "base_template.md"  # 基础模板
  # 从 skill.yaml 加载的内容
  agent_name: "Sisyphus"
  agent_description: "智能任务编排专家"
  role: |
    你是 Sisyphus，一个资深的项目经理和技术架构师。
    你的核心能力是**理解需求、智能决策、高效执行**。
  positioning: |
    你不是简单的"信息整合者"，而是**决策者和执行者**：
    - 理解用户的真实需求（不只是字面意思）
    - 基于上下文和工具做出最优决策
    - 像资深工程师一样自然地交流

# 工具列表（CoreOrchestrator 会过滤和管理）
tools:
  # 项目理解
  - discover_project_docs
  - repo_map
  - get_repo_structure
  
  # 搜索
  - text_search
  - regex_search
  - semantic_code_search
  
  # 文件操作
  - read_file
  - batch_read_files
  - write_file
  - batch_write_files
  - list_files
  - delete_file
  - batch_delete_files
  - get_file_info
  
  # 代码分析
  - get_file_symbols
  - lsp_diagnostics
  - lsp_find_references
  - lsp_symbols
  - lsp_goto_definition
  
  # 编辑
  - search_replace
  - intelligent_diff_edit
  
  # Git
  - git_status
  - git_diff
  - git_commit
  
  # 测试
  - run_test
  - run_lint
  - run_command

# 🆕 工作流配置（从 intents.yaml 继承）
workflows:
  # 从 sisyphus-orchestrator 继承所有工作流
  source: sisyphus-orchestrator
  
  # 可选：只使用部分意图（如果不设置，使用所有意图）
  # preferred_intents:
  #   - general_chat
  #   - need_code_context
  #   - understand_project
  #   - write_code
  #   - refactor_code
  #   - write_test
  #   - run_test

# 🆕 项目理解配置（预取机制）
project_understanding:
  # 使用 LLM 意图判断（而不是死关键词）
  use_intent: true
  
  # 字符数限制（可选，不设置则使用默认值）
  doc_chars: 4000        # 项目文档
  struct_chars: 5000     # 目录结构
  repomap_chars: 12000   # 代码地图
  
  # 总字符数上限（可选）
  max_chars: 20000       # sisyphus 处理复杂任务，给更多预算
  
  # 指导语（可选）
  header: |
    理解项目时，先看【目录结构】了解整体布局，再看【代码地图】掌握核心代码和架构，最后看【项目文档】补充背景信息。
    用1-2段话概括项目核心，不要逐条罗列。

# 中间件（可选）
middleware:
  - context_management
  - memory_integration

# 权限配置（可选）
permissions:
  read:
    - pattern: "*"
      permission: allow
  write:
    - pattern: "*"
      permission: ask
  execute:
    - pattern: "*"
      permission: ask

# 输入（可选，用于文档）
inputs:
  - name: user_request
    type: string
    required: true
    description: 用户的任务请求
  
  - name: session_id
    type: string
    required: false
    description: 会话ID
  
  - name: repo
    type: string
    required: false
    description: 仓库路径

# 输出（可选，用于文档）
outputs:
  - name: execution_result
    type: string
    description: 执行结果
  
  - name: tools_used
    type: array
    description: 使用的工具列表

# Hook配置（可选）
hooks:
  - logging
  - metrics
  - memory_save

# 元数据（可选，用于文档）
metadata:
  category: orchestrator
  cost: HIGH
  triggers:
    - "复杂任务"
    - "多步骤任务"
    - "代码分析"
    - "代码编写"
    - "代码重构"
    - "测试编写"
  use_when:
    - "需要理解项目结构"
    - "需要编写或修改代码"
    - "需要重构代码"
    - "需要编写测试"
    - "需要运行测试"
  features:
    - "智能意图识别"
    - "动态工作流加载"
    - "分级预取机制"
    - "记忆系统集成"
    - "工具调用管理"
    - "流式输出支持"
  
  # 工作流说明
  workflow: |
    CoreOrchestrator 执行流程：
    
    1. 意图识别
       - 使用 LLM 分析用户输入
       - 关键词兜底机制
       - 判断预取级别（full/medium/light/none）
    
    2. 预取（如果需要）
       - full: 文档 + 结构 + 地图
       - medium: 结构 + 地图
       - light: 只地图
    
    3. 工作流加载
       - 根据识别的意图加载对应工作流
       - 支持多意图组合
       - 优先级排序
    
    4. Agent 执行
       - 加载记忆（对话历史、用户偏好、任务历史）
       - 构建完整 Prompt（注入工作流、记忆、项目理解）
       - LLM 调用 + 工具执行
       - 保存记忆
    
    5. 返回结果
       - 支持流式输出
       - 包含元数据（意图、工具使用、预取级别）
    
    示例：
    用户："帮我分析这个项目的架构"
    
    执行流程：
    1. 意图识别 → understand_project
    2. 预取级别 → full（需要完整项目理解）
    3. 预取 → 文档 + 结构 + 地图
    4. 加载工作流 → workflows/understand_project.md
    5. Agent 执行 → 分析项目架构
    6. 返回结果 → 项目架构分析报告

# 🆕 与旧版本的区别
# 
# 旧版本（multi_agent）:
# - 使用多个 Agent 协作（sisyphus + code_analyzer + programmer + ...）
# - 需要在 builtin/ 中定义每个 Agent 的 Python 类
# - 配置分散（skill.yaml + intents.yaml + 多个 prompt 文件）
# 
# 新版本（core）:
# - 使用单一 CoreOrchestrator
# - 动态创建 Agent（无需 Python 类）
# - 配置统一（skill.yaml + intents.yaml + workflow 文件）
# - 更简洁、更灵活、更易维护
# 
# 迁移说明：
# 1. 将 orchestrator 改为 core
# 2. 删除 agents 和 agent_tools 配置（不再需要）
# 3. 添加 workflows 配置（指定工作流来源）
# 4. 添加 project_understanding 配置（预取机制）
# 5. 保持 tools、llm、permissions 等配置不变
