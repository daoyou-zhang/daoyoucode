name: testing
version: 1.0.0
description: 测试编写和修复专家（继承 sisyphus-orchestrator 工作流）
orchestrator: core
agent:
  name: sisyphus
  model: qwen-coder-plus
  temperature: 0.3
llm:
  model: qwen-coder-plus
  temperature: 0.3
  max_tokens: 4000
tools:
- batch_read_files
- batch_write_files
- list_files
- read_file
- run_lint
- run_test
- text_search
- write_file
workflows:
  source: sisyphus-orchestrator
project_understanding:
  use_intent: true
middleware:
- context_management
inputs:
- name: test_request
  type: string
  required: true
  description: 测试需求或失败信息
- name: code_content
  type: string
  required: false
  description: 被测代码
- name: test_content
  type: string
  required: false
  description: 现有测试
- name: test_failure
  type: string
  required: false
  description: 测试失败信息
outputs:
- name: test_plan
  type: string
  description: 测试方案
- name: test_code
  type: string
  description: 测试代码
hooks:
- logging
- metrics
metadata:
  category: development
  cost: CHEAP
_migration_notes:
  migrated_from: multi_agent
  original_agents:
  - sisyphus
  - test_expert
  - programmer
  - code_analyzer
  migration_date: '2024-03-08'
  changes:
  - 使用 CoreOrchestrator 替代 multi_agent/simple/react
  - 合并所有 agent_tools 到统一的 tools 列表
  - 添加 workflows 配置（从 intents.yaml 加载）
  - 添加 project_understanding 配置（预取机制）
