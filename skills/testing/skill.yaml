name: testing
version: 1.0.0
description: 测试编写和修复专家（继承 sisyphus-orchestrator 工作流）

# 🆕 使用多Agent编排器
orchestrator: multi_agent
collaboration_mode: main_with_helpers

# 🆕 测试专用 Agent 列表
agents:
  - sisyphus          # 主编排
  - test_expert       # 核心Agent
  - programmer        # 辅助实现
  - code_analyzer     # 辅助分析

prompt:
  file: prompts/test.md  # 简洁版本

# 🆕 工作流配置（继承 + 特化）
workflows:
  source: sisyphus-orchestrator  # 从 sisyphus-orchestrator 继承工作流
  preferred_intents:              # 只使用测试相关的意图
    - write_test
    - debug_test
    - analyze_code

# 意图识别
project_understanding_use_intent: true

# LLM配置（🎯 特化：稍高温度，生成多样的测试用例）
llm:
  model: qwen-coder-plus
  temperature: 0.3  # 稍高温度，生成多样的测试用例
  max_tokens: 4000

middleware:
  - context_management

tools:
  - read_file
  - batch_read_files      # 🆕 批量读取文件
  - write_file
  - batch_write_files     # 🆕 批量写入文件
  - list_files
  - text_search
  - run_test
  - run_lint

inputs:
  - name: test_request
    type: string
    required: true
    description: 测试需求或失败信息
  
  - name: code_content
    type: string
    required: false
    description: 被测代码
  
  - name: test_content
    type: string
    required: false
    description: 现有测试
  
  - name: test_failure
    type: string
    required: false
    description: 测试失败信息

outputs:
  - name: test_plan
    type: string
    description: 测试方案
  
  - name: test_code
    type: string
    description: 测试代码

hooks:
  - logging
  - metrics

metadata:
  category: development
  cost: CHEAP


# 🎯 按 Agent 分配工具（最小权限原则）
agent_tools:
  sisyphus:           # 主编排：协调和执行
    - read_file
    - write_file
    - text_search
  
  test_expert:        # 测试专家：写测试 + 运行测试
    - read_file
    - batch_read_files
    - write_file
    - batch_write_files
    - list_files
    - text_search
    - run_test
    - run_lint
  
  programmer:         # 编程专家：辅助实现
    - read_file
    - batch_read_files
    - write_file
    - batch_write_files
    - text_search
  
  code_analyzer:      # 架构分析：只读
    - read_file
    - batch_read_files
    - text_search
